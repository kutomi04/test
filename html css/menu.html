<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫管理システム</title>
    <!-- Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <style>
        /* ベーススタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* gray-50 */
            color: #111827; /* gray-900 */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1024px;
            padding: 32px;
        }

        h1 {
            text-align: center;
            margin-bottom: 32px;
            font-size: 2rem;
            font-weight: 700;
        }

        /* グリッドレイアウト */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 24px;
        }

        /* レスポンシブ設定 (タブレット以上) */
        @media (min-width: 768px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* レスポンシブ設定 (デスクトップ以上) */
        @media (min-width: 1024px) {
            .menu-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* メニューボタン（カード） */
        .menu-item {
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb; /* gray-200 */
            padding: 32px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            outline: none;
        }

        .menu-item:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6; /* blue-500 */
        }

        /* アイコンの円 */
        .icon-wrapper {
            width: 64px;
            height: 64px;
            background-color: #dbeafe; /* blue-100 */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .icon-wrapper .material-icons-outlined {
            font-size: 32px;
            color: #2563eb; /* blue-600 */
        }

        .menu-item h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px;
        }

        .menu-item p {
            font-size: 0.875rem;
            color: #4b5563; /* gray-600 */
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>在庫管理システム</h1>

        <div class="menu-grid">
            <!-- 顧客登録 -->
            <button class="menu-item" onclick="console.log('顧客登録')">
                <div class="icon-wrapper">
                    <span class="material-icons-outlined">corporate_fare</span>
                </div>
                <h2>顧客登録</h2>
                <p>保育園の登録</p>
            </button>

            <!-- 商品登録 -->
            <button class="menu-item" onclick="console.log('商品登録')">
                <div class="icon-wrapper">
                    <span class="material-icons-outlined">description</span>
                </div>
                <h2>商品登録</h2>
                <p>新しい商品を登録</p>
            </button>

            <!-- 在庫一覧 -->
            <button class="menu-item" onclick="console.log('在庫一覧')">
                <div class="icon-wrapper">
                    <span class="material-icons-outlined">inventory_2</span>
                </div>
                <h2>在庫一覧</h2>
                <p>在庫状況を確認</p>
            </button>

            <!-- 出荷一覧 -->
            <button class="menu-item" onclick="console.log('出荷一覧')">
                <div class="icon-wrapper">
                    <span class="material-icons-outlined">local_shipping</span>
                </div>
                <h2>出荷一覧</h2>
                <p>出荷履歴を確認</p>
            </button>
        </div>
    </div>

</body>
</html>
